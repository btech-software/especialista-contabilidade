name: Docker Image

on:
  workflow_run:
    workflows: [ "Release" ]
    types:
      - completed

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  docker_image:
    runs-on: ubuntu-24.04
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' && !contains(github.event.workflow_run.head_commit.message, 'Automatically generated by python-semantic-release') }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install Cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get the version
        run: echo "VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')" >> $GITHUB_ENV

      - name: Build and push Docker image
        id: build_and_push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: docker/app/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ env.VERSION }}

      - name: Sign and verify the image with GitHub OIDC Token
        env:
          DIGEST: ${{ steps.build_and_push.outputs.digest }}
          COSIGN_EXPERIMENTAL: "1" # Enable keyless signing
        run: |
          # Initialize Sigstore TUF root
          cosign initialize

          image="ghcr.io/${{ github.repository }}@${DIGEST}"

          cosign sign --yes ${image}

          cosign verify ${image} \
            --certificate-identity-regexp 'https://github.com/${{ github.repository }}/.github/workflows/docker-image.yml@refs/heads/main' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com
